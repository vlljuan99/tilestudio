# Fly.io configuration — Tilestudio
# Documentación: https://fly.io/docs/reference/configuration/

# Sustituye `tilestudio` por el nombre que `fly launch` te asigne (o elige tú).
app = "tilestudio"

# Región principal. Cambia a la que ya uses en tu otro proyecto.
# Madrid: mad | Barcelona: not disponible | París: cdg | Frankfurt: fra
primary_region = "mad"

# Kill timeout para que el worker de PDFs termine gracefully (15 min)
kill_timeout = "5m"
kill_signal = "SIGINT"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_SERVER_URL = "https://tilestudio.fly.dev"

[env]
  PORT = "3000"
  # Las variables sensibles van con `fly secrets set` (no en este archivo)
  # Necesarias en secrets: PAYLOAD_SECRET, DATABASE_URI, OPENAI_API_KEY,
  # GOOGLE_API_KEY, opcionalmente AI_PROVIDER y AI_VISION_PROVIDER.

# ----------------------------------------------------------------------------
# Servicio HTTP público
# ----------------------------------------------------------------------------
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"        # Apaga la máquina cuando no hay tráfico
  auto_start_machines = true         # La arranca con la primera request
  min_machines_running = 0           # 0 = ahorra dinero en testing
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# Healthcheck — Fly reinicia la máquina si falla
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  protocol = "http"
  timeout = "5s"

# ----------------------------------------------------------------------------
# Volumen persistente para /app/media
# Crearlo con:  fly volumes create media --region mad --size 5
# ----------------------------------------------------------------------------
[[mounts]]
  source = "media"
  destination = "/app/media"
  initial_size = "5gb"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1gb"
  auto_extend_size_limit = "20gb"

# ----------------------------------------------------------------------------
# Máquina: 1 CPU + 1 GB RAM
# Sharp + canvas + pdfjs en una página grande tiran de RAM; 1 GB cómodo.
# Sube a 2GB si los catálogos PDF son enormes.
# ----------------------------------------------------------------------------
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
